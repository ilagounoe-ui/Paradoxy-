<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éryndale - Cinématique</title>
    <style>
        /* BASE DU JEU */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black;
            color: white;
            font-family: 'Georgia', serif;
            overflow: hidden; /* Empêche de scroller */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* ÉCRAN DE DÉMARRAGE (Pour autoriser le son) */
        #start-screen {
            position: absolute;
            cursor: pointer;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            animation: pulse 2s infinite;
        }

        /* ANIMATIONS CSS */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .fade-in {
            opacity: 1 !important;
            transition: opacity 2s ease-in;
        }

        .fade-out {
            opacity: 0 !important;
            transition: opacity 2s ease-out;
        }

        /* TEXTES DE LA CINÉMATIQUE */
        #cinematic-text {
            position: absolute;
            font-size: 1.5rem;
            color: #d4af37; /* Or sombre */
            opacity: 0;
            padding: 20px;
            max-width: 80%;
        }

        /* MENU DE CRÉATION (Caché au début) */
        #creation-menu {
            display: none;
            background: rgba(40, 30, 20, 0.9);
            border: 2px solid #8b5a2b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            width: 85%;
            max-width: 400px;
        }

        .creation-title { color: #d4af37; border-bottom: 1px solid #8b5a2b; padding-bottom: 10px; }
        input, select {
            width: 100%; padding: 10px; margin: 10px 0;
            background: rgba(0,0,0,0.5); color: white;
            border: 1px solid #8b5a2b; border-radius: 5px;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }
        button {
            width: 100%; padding: 15px; margin-top: 15px;
            background-color: #8b5a2b; color: white;
            border: none; border-radius: 5px;
            font-size: 1.2rem; cursor: pointer;
            font-family: 'Georgia', serif;
        }
        button:active { background-color: #5c3a21; }
    </style>
</head>
<body>

    <audio id="bg-music" src="musique_piano.mp3" loop></audio>

    <div id="start-screen" onclick="lancerCinematique()">
        Toucher l'écran pour commencer
    </div>

    <div id="cinematic-text"></div>

    <div id="creation-menu">
        <h2 class="creation-title">L'Héritage Commence</h2>
        
        <label>Nom du Protagoniste</label>
        <input type="text" id="hero-name" value="Éryndale">
        
        <label>Genre</label>
        <select id="hero-gender">
            <option value="garcon">Garçon</option>
            <option value="fille">Fille</option>
        </select>

        <label>Qualité Visuelle (Future 3D)</label>
        <select id="game-fps">
            <option value="60">Performances (60 FPS)</option>
            <option value="30">Cinématique (30 FPS - 4K)</option>
        </select>

        <button onclick="entrerDansLeCocon()">Éveiller le ResoEther</button>
    </div>

    <script>
        // L'histoire découpée en phrases
        const histoire = [
            "Certaines légendes s'écrivent dans le sang...",
            "Ton grand-père était ton seul repère dans ce monde.",
            "Mais l'ombre l'a dévoré, tout comme elle a emporté ton père.",
            "Aujourd'hui, il ne te reste qu'un héritage...",
            "Le pouvoir de tout changer."
        ];

        let indexTexte = 0;
        const divTexte = document.getElementById("cinematic-text");
        const ecranDepart = document.getElementById("start-screen");
        const musique = document.getElementById("bg-music");
        const menuCreation = document.getElementById("creation-menu");

        // Fonction déclenchée au premier toucher de l'écran
        function lancerCinematique() {
            // 1. Cacher le bouton de départ
            ecranDepart.style.display = "none";
            
            // 2. Lancer la musique (C'est autorisé car le joueur a tapoté !)
            musique.volume = 0.5; // Met le volume à la moitié
            musique.play().catch(e => console.log("Fichier audio non trouvé pour le moment."));

            // 3. Lancer la boucle de texte
            afficherTexteSuivant();
        }

        function afficherTexteSuivant() {
            if (indexTexte < histoire.length) {
                // Mettre le texte
                divTexte.innerText = histoire[indexTexte];
                
                // Faire apparaître (Fade In)
                divTexte.classList.remove("fade-out");
                divTexte.classList.add("fade-in");

                // Attendre 3 secondes, puis faire disparaître (Fade Out)
                setTimeout(() => {
                    divTexte.classList.remove("fade-in");
                    divTexte.classList.add("fade-out");
                    
                    indexTexte++;
                    
                    // Attendre 2 secondes (le temps du fondu au noir) avant la phrase suivante
                    setTimeout(afficherTexteSuivant, 2000);
                }, 3500); // Temps de lecture de la phrase
            } else {
                // Quand l'histoire est finie, afficher le menu de création
                setTimeout(afficherMenuCreation, 1000);
            }
        }

        function afficherMenuCreation() {
            divTexte.style.display = "none";
            menuCreation.style.display = "block";
            // Petit effet d'apparition sur le menu
            menuCreation.classList.add("fade-in");
        }

        function entrerDansLeCocon() {
            // Récupérer les choix du joueur
            const nom = document.getElementById("hero-name").value;
            const genre = document.getElementById("hero-gender").value;
            
            alert(`Bienvenue ${nom}. L'aventure commence ! (Transfert vers le tableau de bord Sentinelle...)`);
            // Ici, tu pourras plus tard lier la fonction Firebase ou rediriger vers l'interface de jeu.
        }
    </script>
</body>
</html>
